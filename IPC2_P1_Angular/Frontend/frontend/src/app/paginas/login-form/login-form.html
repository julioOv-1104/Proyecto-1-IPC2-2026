<div class="login-container">

  <div class="login-box">
    <h1>Iniciar Sesión</h1>
    <form (ngSubmit)="login()">

      <div class="form-group">
        <label for="usuario">Usuario:</label>
        <input [(ngModel)]="nombre_usuario" type="text" id="nombre_usuario" name="nombre_usuario"
          placeholder="Ingrese su usuario" class="form-input" required />
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña:</label>
        <input [(ngModel)]="password" type="password" id="password" name="password" placeholder="Ingrese su contraseña"
          class="form-input" required />
      </div>
     

      <button type="submit" class="login-button">Ingresar</button>

    </form>
    <div *ngIf="mensajeError" style="color: rgb(255, 0, 0);">
      {{ mensajeError }}
    </div>
  </div>
</div>
