<div class="reporte-ventas-wrapper">
  <section class="reporte-ventas-card">
    <header class="reporte-ventas-header">
      <h2>Reporte de Ventas</h2>
      <p>Ventas en un intervalo de tiempo.</p>
    </header>

    <div class="reporte-ventas-scroll">
      <table class="reporte-ventas-table">
        <thead>
          <tr>
            <th>Fecha creación</th>
            <th>Paquete</th>
            <th>Pasajero</th>
            <th>Agente</th>
            <th>Costo total</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let r of reportes">
            <td>{{ r.fecha_creacion }}</td>
            <td>{{ r.paquete }}</td>
            <td>{{ r.pasajero }}</td>
            <td>{{ r.agente }}</td>
            <td>{{ r.costo_total | currency:'USD':'symbol':'1.2-2' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
