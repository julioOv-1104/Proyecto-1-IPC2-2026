<app-menu-admin></app-menu-admin>

<div class="formulario-reportes">
    <h2>Ingresar las fechas a buscar</h2>

    <form>
        <div class="campos-fechas">
            <div class="campo">
                <label for="fechaInicio">Fecha de inicio:</label>
                <input [(ngModel)]="fechaInicio" type="date" id="fechaInicio" name="fechaInicio" required>
            </div>

            <div class="campo">
                <label for="fechaFin">Fecha de fin:</label>
                <input [(ngModel)]="fechaFin" type="date" id="fechaFin" name="fechaFin" required>
            </div>
        </div>

        <div class="botones">
            <button (click)="obtenerReporteVentas()" type="button" class="btn-ventas">Ventas en intervalo de tiempo</button>
            <button (click)="prueba()" type="button" class="btn-cancelaciones">Cancelaciones en intervalo de tiempo</button>
            <button type="button" class="btn-ventas">Ganancias en intervalo de tiempo</button>
            <button type="button" class="btn-cancelaciones">Agente con mas ventas en intervalo de tiempo</button>
        </div>
        <br>
        <div class="botones">
            <button type="button" class="btn-ventas">Agente con mas ganancias en intervalo de tiempo</button>
            <button type="button" class="btn-cancelaciones">Paquete mas vendido en intervalo de tiempo</button>
            <button type="button" class="btn-ventas">Paquete menos vendido en intervalo de tiempo</button>
            <button type="button" class="btn-cancelaciones">Reservaciones por destino en intervalo de tiempo</button>
        </div>

    </form>
</div>


<div>

    <table *ngIf="reportesVentas.length > 0">

        <thead>
            <tr>
                <th>Paquete</th>
                <th>Pasajero</th>
                <th>Agente</th>
                <th>Costo Total</th>
                <th>Fecha Creación</th>
            </tr>
        </thead>

        <tbody>

            <tr *ngFor="let r of reportesVentas">
                <td>{{r.paquete}}|</td>
                <td>{{r.pasajero}}|</td>
                <td>{{r.agente}}|</td>
                <td>{{r.costo_total}}|</td>
                <td>{{r.fecha_creacion}}|</td>
            </tr>

        </tbody>

    </table>

</div>
