<div class="login-container">

  <div class="login-box">
    <h1>Crear Usuario</h1>
    <form (ngSubmit)="registrar()">

      <div class="form-group">
        <label for="usuario">Nombre Usuario:</label>
        <input  [(ngModel)]="nombre_usuario" type="text" id="nombre_usuario" name="nombre_usuario"
          placeholder="Ingrese su usuario" class="form-input" required />
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña:</label>
        <input  [(ngModel)]="password" type="password" id="password" name="password" placeholder="Ingrese su contraseña"
          class="form-input" required />
      </div>

    <div class="form-group">
        <label for="rol">Rol: 1: Atencion al Cliente, 2: Operaciones, 3: Administrador</label>
        <input  [(ngModel)]="rol" type="number" id="rol" name="rol"
            placeholder="Ingrese su rol (1-3)"
            class="form-input"
            min="1" max="3" step="1"
            required />
    </div>


      <button type="submit" class="login-button">Registrar</button>

    </form>
    <div *ngIf="mensajeError" style="color: rgb(255, 0, 0);">
      {{ mensajeError }}
    </div>
  </div>
</div>
<app-menu-admin></app-menu-admin>
