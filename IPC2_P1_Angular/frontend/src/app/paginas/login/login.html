<div class="login-container">

  <div class="login-box">
    <h1>Iniciar Sesión</h1>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="usuario">Usuario:</label>
        <input
          type="text"
          id="usuario"
          formControlName="usuario"
          placeholder="Ingrese su usuario"
          class="form-input"
        />

        <div class="error-message" *ngIf="submit && usuario?.invalid">
          <span *ngIf="usuario?.errors?.['required']">El usuario es requerido</span>          
        </div>
      </div>

      
      <div class="form-group">
        <label for="contrasena">Contraseña:</label>
        <input
          type="password"
          id="contrasena"
          formControlName="contrasena"
          placeholder="Ingrese su contraseña"
          class="form-input"
        />
        <div class="error-message" *ngIf="submit && contrasena?.invalid">
          <span *ngIf="contrasena?.errors?.['required']">La contraseña es requerida</span>         
        </div>
      </div>

      
      <button type="submit" class="login-button">Ingresar</button>
    </form>
  </div>
</div>
